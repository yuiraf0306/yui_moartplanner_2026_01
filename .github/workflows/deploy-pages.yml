name: Build and deploy to GitHub Pages

on:
  push:
    branches:
      - dev/feature/fish-design
      - main
  workflow_dispatch: {}

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare artifact in subfolder
        run: |
          mkdir -p out/yui_moartplanner_2026_1.1
          cp -a dist/. out/yui_moartplanner_2026_1.1/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: out

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
